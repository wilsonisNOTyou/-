name: Daily Game Switch

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日0時JST (15:00 UTC)
  workflow_dispatch:

jobs:
  switch-game:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Switch to today's game
        run: |
          python3 - <<'EOF'
          import json
          from datetime import date, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          today = date.today().astimezone(JST) if hasattr(date.today(), 'astimezone') else date.today()

          # 基準日（2026-07-01）からの日数でゲームを順番に切り替え
          base = date(2026, 7, 1)
          days = (date.today(), base)
          diff = (date.today() - base).days

          with open('games/schedule.json') as f:
              schedule = json.load(f)

          game = schedule[diff % len(schedule)]
          src = f'games/{game}.html'

          with open(src) as f:
              content = f.read()
          with open('a.html', 'w') as f:
              f.write(content)

          print(f"Switched to: {game}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add a.html
          git diff --cached --quiet || git commit -m "chore: switch to today's game [skip ci]"
          git push
