<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マインスウィーパー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #eee; }
  h1 { margin-bottom: 8px; font-size: 1.5rem; letter-spacing: 2px; }
  #info { margin-bottom: 10px; font-size: 1rem; }
  #board { display: grid; grid-template-columns: repeat(10, 36px); gap: 3px; background: #0f0f23; padding: 8px; border: 2px solid #4ecca3; border-radius: 6px; }
  .cell { width: 36px; height: 36px; background: #2a2a4a; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; cursor: pointer; user-select: none; }
  .cell.revealed { background: #1a1a3e; cursor: default; }
  .cell.flagged { background: #3a2a4a; }
  .cell.mine { background: #ff6b6b; }
  #message { margin-top: 14px; color: #4ecca3; height: 1.5em; font-size: 1rem; }
  #restart { margin-top: 10px; padding: 8px 24px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<h1>MINESWEEPER</h1>
<div id="info">残り地雷: <span id="mines">15</span> | 旗: <span id="flags">0</span></div>
<div id="board"></div>
<div id="message">左クリック: 開く / 右クリック: 旗</div>
<button id="restart" onclick="init()">リスタート</button>
<script>
const ROWS = 10, COLS = 10, MINES = 15;
const NUM_COLORS = ['','#4d96ff','#6bcb77','#ff6b6b','#c77dff','#ff9f43','#4ecca3','#ffd93d','#eee'];

let grid, revealed, flagged, gameOver, firstClick, flagCount;

function init() {
  grid = Array.from({length:ROWS}, () => Array(COLS).fill(0));
  revealed = Array.from({length:ROWS}, () => Array(COLS).fill(false));
  flagged = Array.from({length:ROWS}, () => Array(COLS).fill(false));
  gameOver = false; firstClick = true; flagCount = 0;
  document.getElementById('mines').textContent = MINES;
  document.getElementById('flags').textContent = 0;
  document.getElementById('message').textContent = '左クリック: 開く / 右クリック: 旗';
  render();
}

function placeMines(sr, sc) {
  let placed = 0;
  while (placed < MINES) {
    const r = Math.floor(Math.random()*ROWS);
    const c = Math.floor(Math.random()*COLS);
    if (grid[r][c] === -1) continue;
    if (Math.abs(r-sr) <= 1 && Math.abs(c-sc) <= 1) continue;
    grid[r][c] = -1; placed++;
  }
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r+dr, nc = c+dc;
          if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && grid[nr][nc]===-1) count++;
        }
      grid[r][c] = count;
    }
}

function reveal(r, c) {
  if (r<0||r>=ROWS||c<0||c>=COLS) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (grid[r][c] === 0)
    for (let dr=-1; dr<=1; dr++)
      for (let dc=-1; dc<=1; dc++)
        reveal(r+dr, c+dc);
}

function click(r, c) {
  if (gameOver || revealed[r][c] || flagged[r][c]) return;
  if (firstClick) { placeMines(r, c); firstClick = false; }
  if (grid[r][c] === -1) {
    revealAll(); gameOver = true;
    document.getElementById('message').textContent = '爆発！ゲームオーバー';
    render(); return;
  }
  reveal(r, c);
  render();
  if (checkWin()) {
    gameOver = true;
    document.getElementById('message').textContent = 'クリア！';
  }
}

function rightClick(e, r, c) {
  e.preventDefault();
  if (gameOver || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  document.getElementById('flags').textContent = flagCount;
  render();
}

function revealAll() {
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (grid[r][c]===-1) revealed[r][c] = true;
}

function checkWin() {
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (grid[r][c] !== -1 && !revealed[r][c]) return false;
  return true;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (flagged[r][c] && !revealed[r][c]) {
        cell.classList.add('flagged');
        cell.textContent = '🚩';
      } else if (revealed[r][c]) {
        if (grid[r][c] === -1) { cell.classList.add('mine'); cell.textContent = '💣'; }
        else { cell.classList.add('revealed'); if (grid[r][c] > 0) { cell.textContent = grid[r][c]; cell.style.color = NUM_COLORS[grid[r][c]]; } }
      }
      cell.addEventListener('click', () => click(r, c));
      cell.addEventListener('contextmenu', e => rightClick(e, r, c));
      board.appendChild(cell);
    }
}

init();
</script>
</body>
</html>
