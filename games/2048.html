<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #eee; }
  h1 { margin-bottom: 8px; font-size: 1.5rem; letter-spacing: 2px; }
  #score { margin-bottom: 12px; font-size: 1.1rem; }
  #board { display: grid; grid-template-columns: repeat(4, 90px); gap: 8px; background: #2a2a4a; padding: 8px; border-radius: 8px; border: 2px solid #4ecca3; }
  .cell { width: 90px; height: 90px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: bold; background: #0f0f23; transition: background 0.1s; }
  #message { margin-top: 14px; color: #4ecca3; height: 1.5em; font-size: 1rem; }
  #restart { margin-top: 10px; padding: 8px 24px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<h1>2048</h1>
<div id="score">スコア: 0</div>
<div id="board"></div>
<div id="message">矢印キーでスライド</div>
<button id="restart" onclick="init()">リスタート</button>
<script>
const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');
const COLORS = {
  0:'#0f0f23', 2:'#4ecca3', 4:'#38b48b', 8:'#ffd93d', 16:'#ff9f43',
  32:'#ff6b6b', 64:'#c77dff', 128:'#4d96ff', 256:'#6bcb77',
  512:'#ff6b9d', 1024:'#00d2ff', 2048:'#fff'
};

let grid, score;

function init() {
  grid = Array.from({length:4}, () => Array(4).fill(0));
  score = 0;
  scoreEl.textContent = 'スコア: 0';
  messageEl.textContent = '矢印キーでスライド';
  addTile(); addTile();
  render();
}

function addTile() {
  const empty = [];
  grid.forEach((row,r) => row.forEach((v,c) => { if(!v) empty.push([r,c]); }));
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function slide(row) {
  let arr = row.filter(v => v);
  let gained = 0;
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2; gained += arr[i]; arr.splice(i+1,1);
    }
  }
  while (arr.length < 4) arr.push(0);
  return { row: arr, gained };
}

function move(dir) {
  let moved = false, gained = 0;
  const g = grid.map(r => [...r]);

  if (dir === 'left') {
    for (let r = 0; r < 4; r++) {
      const res = slide(grid[r]);
      if (res.row.join() !== grid[r].join()) moved = true;
      grid[r] = res.row; gained += res.gained;
    }
  } else if (dir === 'right') {
    for (let r = 0; r < 4; r++) {
      const res = slide([...grid[r]].reverse());
      const row = res.row.reverse();
      if (row.join() !== grid[r].join()) moved = true;
      grid[r] = row; gained += res.gained;
    }
  } else if (dir === 'up') {
    for (let c = 0; c < 4; c++) {
      const col = grid.map(r => r[c]);
      const res = slide(col);
      if (res.row.join() !== col.join()) moved = true;
      res.row.forEach((v,r) => grid[r][c] = v);
      gained += res.gained;
    }
  } else if (dir === 'down') {
    for (let c = 0; c < 4; c++) {
      const col = grid.map(r => r[c]).reverse();
      const res = slide(col);
      const newCol = res.row.reverse();
      const orig = grid.map(r => r[c]);
      if (newCol.join() !== orig.join()) moved = true;
      newCol.forEach((v,r) => grid[r][c] = v);
      gained += res.gained;
    }
  }

  if (moved) {
    score += gained;
    scoreEl.textContent = `スコア: ${score}`;
    addTile();
    render();
    if (grid.flat().includes(2048)) { messageEl.textContent = '2048達成！'; return; }
    if (!canMove()) messageEl.textContent = 'ゲームオーバー！';
  }
}

function canMove() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      if (!grid[r][c]) return true;
      if (c < 3 && grid[r][c] === grid[r][c+1]) return true;
      if (r < 3 && grid[r][c] === grid[r+1][c]) return true;
    }
  return false;
}

function render() {
  boardEl.innerHTML = '';
  grid.flat().forEach(v => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = v || '';
    cell.style.background = COLORS[v] || '#e040fb';
    cell.style.color = v >= 8 ? '#1a1a2e' : '#eee';
    boardEl.appendChild(cell);
  });
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if (map[e.key]) { move(map[e.key]); e.preventDefault(); }
});

let tx;
document.addEventListener('touchstart', e => tx = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
});

init();
</script>
</body>
</html>
